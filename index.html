<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>dotmd</title>
    
    <!-- PWA / iOS Capabilities -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="dotmd">
    
    <!-- Styling & Rendering Engines -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- KaTeX (Math) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- React Framework -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Mermaid (Diagrams) -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .preview-area { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .preview-area h1 { font-size: 1.8rem; font-weight: 700; margin: 1.5rem 0 1rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3rem; }
        .preview-area h2 { font-size: 1.4rem; font-weight: 600; margin: 1.2rem 0 0.8rem; }
        .preview-area h3 { font-size: 1.2rem; font-weight: 600; margin: 1rem 0 0.5rem; color: #2563eb; }
        .preview-area p { margin-bottom: 1rem; line-height: 1.6; }
        .preview-area code { background: #f6f8fa; padding: 0.2rem 0.4rem; border-radius: 3px; font-family: monospace; font-size: 0.9em; }
        .preview-area pre { background: #f6f8fa; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 1rem; }
        .preview-area blockquote { border-left: 4px solid #e2e8f0; padding-left: 1rem; color: #64748b; font-style: italic; margin-bottom: 1rem; }
        .preview-area table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; }
        .preview-area th, .preview-area td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; }
        .preview-area th { background: #f8fafc; }
        
        .tool-btn {
            flex-shrink: 0;
            padding: 8px 12px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .pane-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Fixed Split View for Mobile */
        @media (max-width: 768px) {
            .work-area-split {
                flex-direction: row !important;
                overflow-x: auto !important;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
            }
            .work-area-split > section {
                min-width: 90vw !important;
                scroll-snap-align: start;
                flex-shrink: 0;
            }
        }

        /* Hide UI elements during Print */
        @media print {
            header, .controls, .toolbelt, .export-modal { display: none !important; }
            main { display: block !important; height: auto !important; overflow: visible !important; }
            .preview-pane { width: 100% !important; display: block !important; padding: 0 !important; }
            .editor-pane { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-gray-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
    
        function App() {
            const [markdown, setMarkdown] = useState(() => {
                return localStorage.getItem('dotmd_v2') || "# Split View Editor\n\nEdit on the left, see math on the right.\n\n$$ \\nabla \\cdot \\mathbf{E} = \\frac{\\rho}{\\epsilon_0} $$";
            });
            
            const [layout, setLayout] = useState('split');
            const [showHelp, setShowHelp] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            
            const previewRef = useRef(null);
            const helpRef = useRef(null);
            const textareaRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('dotmd_v2', markdown);
            }, [markdown]);

            const renderFeatures = (container) => {
                if (!container) return;
                
                renderMathInElement(container, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                });
        
                const mermaidDivs = container.querySelectorAll('.language-mermaid');
                if (mermaidDivs.length > 0) {
                    setTimeout(async () => {
                        mermaid.initialize({ 
                            startOnLoad: false, 
                            theme: 'neutral',
                            securityLevel: 'loose',
                            flowchart: { useMaxWidth: true, htmlLabels: true }
                        });
                        await mermaid.run({ nodes: mermaidDivs });
                    }, 50);
                }
            };

            useEffect(() => {
                renderFeatures(previewRef.current);
            }, [markdown, layout]);

            useEffect(() => {
                if (showHelp) renderFeatures(helpRef.current);
            }, [showHelp]);

            const insertSnippet = (snippet) => {
                const el = textareaRef.current;
                if (!el) return;
                const start = el.selectionStart;
                const end = el.selectionEnd;
                const text = el.value;
                setMarkdown(text.substring(0, start) + snippet + text.substring(end));
                setTimeout(() => {
                    el.focus();
                    el.setSelectionRange(start + snippet.length, start + snippet.length);
                }, 10);
            };

            const doExport = (type) => {
                const date = new Date().toISOString().split('T')[0];
                const filename = `dotmd_${date}`;

                if (type === 'pdf') {
                    const originalLayout = layout;
                    setLayout('preview');
                    setTimeout(() => { 
                        window.print(); 
                        setLayout(originalLayout);
                        setIsExporting(false); 
                    }, 500);
                    return;
                }

                let blob, ext;
                if (type === 'md') { blob = new Blob([markdown], { type: 'text/markdown' }); ext = ".md"; }
                else { 
                    const html = marked.parse(markdown);
                    const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:sans-serif;line-height:1.6;padding:2rem;max-width:800px;margin:auto;}</style></head><body>${html}</body></html>`;
                    blob = new Blob([doc], { type: 'text/html' }); ext = ".html"; 
                }

                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename + ext; a.click();
                URL.revokeObjectURL(url);
                setIsExporting(false);
            };

            const tools = [
                { label: "#", cmd: "# " },
                { label: "$$", cmd: "$$ \n\n $$" },
                { label: "Flow", cmd: "```mermaid\nflowchart TD\n  A --> B\n```" },
                { label: "Bold", cmd: "****" },
                { label: "Table", cmd: "| H | H |\n|---|---|\n| D | D |" }
            ];

            const helpMarkdown = `
# dotmd Documentation

## 1. Markdown Syntax
### Text Styling
- **Bold**: \`**text**\`
- *Italic*: \`*text*\`
- ~~Strikethrough~~: \`~~text~~\`
- \`Inline Code\`: \` \`code\` \`

### Lists & Tables
- **Unordered**: Use \`-\` or \`*\`
- **Tables**:
\`\`\`markdown
| Parameter | Value |
| :--- | :---: |
| Index (n) | 1.52 |
\`\`\`

## 2. Mathematics (LaTeX)
Powered by KaTeX. Use \`$\` for inline and \`$$\` for blocks.

- **Fractions**: \`\\frac{a}{b}\` -> $\\frac{a}{b}$
- **Greek**: \`\\alpha, \\beta, \\theta, \\lambda\` -> $\\alpha, \\beta, \\theta, \\lambda$
- **Sup/Sub**: \`n_1^2, e^{i\\phi}\` -> $n_1^2, e^{i\\phi}$

## 3. Diagrams (Mermaid)
Wrap in \` \` \`mermaid \` \` \` blocks.

\`\`\`mermaid
flowchart LR
    A[Start] --> B{Condition}
    B -- Yes --> C[Result]
\`\`\`

## 4. Tips
- **Split View**: On mobile, swipe horizontally between Editor and Preview.
- **Persistence**: Content is saved locally in your browser automatically.
`;

            return (
                <div className="flex flex-col h-screen max-h-screen bg-slate-100">
                    {/* Header */}
                    <header className="pt-10 pb-3 px-6 bg-white border-b flex justify-between items-center z-30 shadow-sm">
                        <div className="flex items-center gap-3">
                            <h1 className="text-xl font-black text-blue-600 italic tracking-tighter">dotmd</h1>
                            <button onClick={() => setShowHelp(true)} className="text-gray-400 hover:text-blue-600 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                            </button>
                        </div>
                        
                        <div className="flex items-center gap-2">
                            <div className="bg-slate-100 p-1 rounded-lg flex items-center">
                                <button onClick={() => setLayout('editor')} className={`px-3 py-1 rounded-md text-[10px] font-bold transition-all ${layout === 'editor' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>Edit</button>
                                <button onClick={() => setLayout('split')} className={`px-3 py-1 rounded-md text-[10px] font-bold transition-all ${layout === 'split' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>Split</button>
                                <button onClick={() => setLayout('preview')} className={`px-3 py-1 rounded-md text-[10px] font-bold transition-all ${layout === 'preview' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}>View</button>
                            </div>
                            
                            <div className="relative">
                                <button onClick={() => setIsExporting(!isExporting)} className="bg-blue-600 text-white px-4 py-1.5 rounded-full text-[10px] font-bold shadow-md active:scale-95 transition-transform">Export</button>
                                {isExporting && (
                                    <div className="absolute right-0 mt-3 w-40 bg-white border rounded-xl shadow-2xl z-50 overflow-hidden ring-1 ring-black/5">
                                        <button onClick={() => doExport('md')} className="w-full text-left px-4 py-3 text-sm active:bg-slate-50 border-b">Markdown</button>
                                        <button onClick={() => doExport('html')} className="w-full text-left px-4 py-3 text-sm active:bg-slate-50 border-b">HTML</button>
                                        <button onClick={() => doExport('pdf')} className="w-full text-left px-4 py-3 text-sm active:bg-slate-50 text-blue-600 font-bold">PDF (Print)</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* Work Area */}
                    <main className={`flex-1 flex p-2 gap-2 ${layout === 'split' ? 'work-area-split' : 'flex-col md:flex-row overflow-hidden'}`}>
                        {/* Editor Pane */}
                        <section className={`pane-transition bg-white rounded-2xl shadow-sm border overflow-hidden flex flex-col ${layout === 'editor' ? 'flex-1' : layout === 'preview' ? 'hidden' : 'flex-1'}`}>
                            <div className="px-4 py-2 border-b flex justify-between items-center bg-slate-50/50">
                                <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400">Editor</span>
                                <button onClick={() => setLayout(layout === 'editor' ? 'split' : 'editor')} className="text-slate-400 hover:text-blue-600">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
                                </button>
                            </div>
                            <textarea 
                                ref={textareaRef}
                                className="flex-1 p-6 text-[17px] leading-relaxed outline-none resize-none font-mono text-slate-700 no-scrollbar"
                                value={markdown}
                                onChange={(e) => setMarkdown(e.target.value)}
                                spellCheck="false"
                            />
                            <div className="p-2 border-t flex gap-2 overflow-x-auto no-scrollbar bg-white">
                                {tools.map((t, i) => (
                                    <button key={i} onClick={() => insertSnippet(t.cmd)} className="tool-btn active:bg-slate-100">{t.label}</button>
                                ))}
                            </div>
                        </section>

                        {/* Preview Pane */}
                        <section className={`pane-transition bg-white rounded-2xl shadow-sm border overflow-hidden flex flex-col ${layout === 'preview' ? 'flex-1' : layout === 'editor' ? 'hidden' : 'flex-1'}`}>
                            <div className="px-4 py-2 border-b flex justify-between items-center bg-slate-50/50">
                                <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400">Preview</span>
                                <button onClick={() => setLayout(layout === 'preview' ? 'split' : 'preview')} className="text-slate-400 hover:text-blue-600">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
                                </button>
                            </div>
                            <div 
                                ref={previewRef}
                                className="preview-area flex-1 p-6 overflow-y-auto no-scrollbar"
                                dangerouslySetInnerHTML={{ __html: marked.parse(markdown) }}
                            />
                        </section>
                    </main>

                    {/* Help Drawer */}
                    {showHelp && (
                        <div className="fixed inset-0 z-50 flex justify-end">
                            <div className="absolute inset-0 bg-black/20 backdrop-blur-sm" onClick={() => setShowHelp(false)}></div>
                            <div className="relative w-full max-w-xl bg-white h-full shadow-2xl flex flex-col pane-transition">
                                <div className="flex justify-between items-center p-6 border-b">
                                    <h2 className="text-2xl font-bold">Documentation</h2>
                                    <button onClick={() => setShowHelp(false)} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                    </button>
                                </div>
                                <div 
                                    ref={helpRef}
                                    className="preview-area flex-1 p-8 overflow-y-auto no-scrollbar" 
                                    dangerouslySetInnerHTML={{ __html: marked.parse(helpMarkdown) }} 
                                />
                            </div>
                        </div>
                    )}
                </div>
            );
        }
    
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
