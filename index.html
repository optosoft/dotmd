<!DOCTYPE html>
<html lang="en">
<head>

    <title>dotmd</title>
    
    <!-- PWA / iOS Capabilities -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

        tailwind.config = {
            darkMode: 'class',
        }

    <!-- Highlight.js -->

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .preview-area { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .preview-area h1 { font-size: 1.8rem; font-weight: 700; margin: 1.5rem 0 1rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3rem; }
        .preview-area h2 { font-size: 1.4rem; font-weight: 600; margin: 1.2rem 0 0.8rem; }
        .preview-area h3 { font-size: 1.2rem; font-weight: 600; margin: 1rem 0 0.5rem; color: #2563eb; }
        .preview-area h4 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.5rem; }
        .preview-area h5 { font-size: 1rem; font-weight: 600; margin: 1rem 0 0.5rem; }
        .preview-area h6 { font-size: 0.9rem; font-weight: 600; margin: 1rem 0 0.5rem; color: #64748b; }
        .preview-area p { margin-bottom: 1rem; line-height: 1.6; }
        .preview-area code { background: #f6f8fa; padding: 0.2rem 0.4rem; border-radius: 3px; font-family: monospace; font-size: 0.9em; }
        .preview-area pre { background: #f6f8fa; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 1rem; position: relative; }
        .preview-area blockquote { border-left: 4px solid #e2e8f0; padding-left: 1rem; color: #64748b; font-style: italic; margin-bottom: 1rem; }
        .preview-area table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; }
        .preview-area th, .preview-area td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; }
        .preview-area th { background: #f8fafc; }
        .preview-area pre code.hljs { background: transparent; padding: 0; }
        
        /* Markdown Extended Elements CSS */
        .preview-area ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .preview-area ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1rem; }
        .preview-area li { margin-bottom: 0.25rem; }
        .preview-area li:has(input[type="checkbox"]) { list-style-type: none; margin-left: -1.5rem; display: flex; align-items: center; }
        .preview-area input[type="checkbox"] { margin-right: 0.5rem; cursor: pointer; }
        .preview-area a { color: #2563eb; text-decoration: underline; text-underline-offset: 2px; }
        .dark .preview-area a { color: #60a5fa; }
        .preview-area img { max-width: 100%; height: auto; border-radius: 0.5rem; margin: 1rem 0; display: block; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .preview-area del { text-decoration: line-through; opacity: 0.7; }
        .preview-area hr { border: 0; border-top: 1px solid #e2e8f0; margin: 2rem 0; }
        .dark .preview-area hr { border-top-color: #334155; }
        .preview-area dl { margin-bottom: 1rem; background: #f8fafc; padding: 1rem; border-radius: 0.5rem; border-left: 4px solid #cbd5e1; }
        .preview-area dt { font-weight: 700; margin-bottom: 0.25rem; color: #0f172a; }
        .preview-area dd { margin-left: 0; margin-bottom: 0.75rem; color: #475569; }
        .preview-area dd:last-child { margin-bottom: 0; }

        .dark .preview-area h1 { border-bottom-color: #334155; }
        .dark .preview-area h3 { color: #60a5fa; }
        .dark .preview-area h6 { color: #94a3b8; }
        .dark .preview-area code { background: #1e293b; color: #e2e8f0; }
        .dark .preview-area pre { background: #1e293b; }
        .dark .preview-area pre code { background: transparent; }
        .dark .preview-area blockquote { border-left-color: #475569; color: #94a3b8; }
        .dark .preview-area th, .dark .preview-area td { border-color: #334155; }
        .dark .preview-area th { background: #0f172a; }
        .dark .preview-area dl { background: #1e293b; border-left-color: #475569; }
        .dark .preview-area dt { color: #f8fafc; }
        .dark .preview-area dd { color: #94a3b8; }
        
        /* Front-matter Styles */
        .preview-area .front-matter { background: #f8fafc; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; border: 1px solid #e2e8f0; font-size: 0.85rem; font-family: monospace; overflow-x: auto; }
        .preview-area .front-matter table { margin: 0; width: auto; }
        .preview-area .front-matter th, .preview-area .front-matter td { border: none; padding: 0.25rem 1rem 0.25rem 0; background: transparent; }
        .preview-area .front-matter th { color: #64748b; text-align: right; font-weight: 600; }
        .dark .preview-area .front-matter { background: #0f172a; border-color: #334155; }
        .dark .preview-area .front-matter th { color: #94a3b8; }

        .preview-area pre .copy-btn { opacity: 0; }
        .preview-area pre:hover .copy-btn, .preview-area pre .copy-btn:focus { opacity: 1; }

        .tool-btn {
            flex-shrink: 0;
            padding: 8px 12px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .dark .tool-btn {
            background: #1e293b;
            border-color: #334155;
            color: #f8fafc;
        }

        .pane-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Desktop: Horizontal Split */
        @media (min-width: 769px) {
            .work-area-split {
                flex-direction: row !important;
            }
            .work-area-split > section {
                min-height: auto !important;
                flex: 1;
            }
        }

        /* Hide UI elements during Print */
        @media print {
            header, .controls, .toolbelt, .export-modal { display: none !important; }
            main { display: block !important; height: auto !important; overflow: visible !important; }
            .preview-pane { width: 100% !important; display: block !important; padding: 0 !important; }
            .editor-pane { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 overflow-hidden text-[17px]">
    <div id="root"></div>

    <script type="text/babel">
        // Emoji Extension Tokenizer
        const EMOJI_MAP = {
            'smile': '😄', 'laughing': '😆', 'blush': '😊', 'smiley': '😃', 
            'heart': '❤️', 'thumbsup': '👍', '+1': '👍', 'thumbsdown': '👎', '-1': '👎', 
            'rocket': '🚀', 'fire': '🔥', 'star': '⭐', 'tada': '🎉', 
            'checkered_flag': '🏁', 'sparkles': '✨', 'boom': '💥', 
            '100': '💯', 'x': '❌', 'warning': '⚠️', 'heavy_check_mark': '✔️', 
            'robot': '🤖', 'bug': '🐛', 'hammer': '🔨', 'memo': '📝',
            'bulb': '💡', 'zap': '⚡️', 'construction': '🚧', 'green_heart': '💚',
            'check': '✅', 'grin': '😁', 'thinking': '🤔', 'sunglasses': '😎'
        };

        const emojiExtension = {
            name: 'emoji',
            level: 'inline',
            start(src) { return src.match(/:[a-zA-Z0-9_+-]+:/)?.index; },
            tokenizer(src, tokens) {
                const rule = /^:([a-zA-Z0-9_+-]+):/;
                const match = rule.exec(src);
                if (match) {
                    return { type: 'emoji', raw: match[0], emoji: match[1] };
                }
            },
            renderer(token) {
                return EMOJI_MAP[token.emoji] || token.raw;
            }
        };

        // Pre-processor for Footnotes and Definition Lists (shields code blocks)
        const processExtendedMarkdown = (md) => {
            if (!md) return '';

            let tempMd = md;
            let frontMatterHtml = '';
            
            // Extract YAML Front-matter for SSG compatibility
            tempMd = tempMd.replace(/^---\n([\s\S]*?)\n---(?:\n|$)/, (match, yaml) => {
                let tableRows = '';
                yaml.split('\n').forEach(line => {
                    const colonIdx = line.indexOf(':');
                    if (colonIdx > -1) {
                        const key = line.slice(0, colonIdx).trim();
                        const val = line.slice(colonIdx + 1).trim().replace(/^["']|["']$/g, '');
                        tableRows += `<tr><th>${key}</th><td>${val}</td></tr>`;
                    }
                });
                if (tableRows) {
                    frontMatterHtml = `<div class="front-matter"><table>${tableRows}</table></div>\n\n`;
                }
                return ''; // Remove from raw markdown passing to marked.js
            });

            // Process PlantUML before shielding other code blocks
            tempMd = tempMd.replace(/```plantuml\n([\s\S]*?)```/g, (match, code) => {
                if (typeof plantumlEncoder !== 'undefined') {
                    const encoded = plantumlEncoder.encode(code);
                    return `\n<div class="flex justify-center my-4"><img src="https://www.plantuml.com/plantuml/svg/${encoded}" alt="PlantUML Diagram" class="max-w-full rounded-none shadow-none m-0" /></div>\n`;
                }
                return match;
            });

            const codeBlocks = [];
            tempMd = tempMd.replace(/```[\s\S]*?```/g, match => {
                codeBlocks.push(match);
                return `___CODE_BLOCK_${codeBlocks.length - 1}___`;
            });
            tempMd = tempMd.replace(/`[^`]*`/g, match => {
                codeBlocks.push(match);
                return `___CODE_BLOCK_${codeBlocks.length - 1}___`;
            });
            
            const footnotes = [];
            tempMd = tempMd.replace(/^\[\^([A-Za-z0-9_-]+)\]:\s+(.*)$/gm, (match, id, text) => {
                footnotes.push({ id, text });
                return '';
            });
            tempMd = tempMd.replace(/\[\^([A-Za-z0-9_-]+)\]/g, (match, id) => {
                return `<sup><a href="#fn-${id}" id="fnref-${id}" class="text-blue-600 dark:text-blue-400 no-underline hover:underline">[${id}]</a></sup>`;
            });
            
            tempMd = tempMd.replace(/^([^\n<]+)\n:\s+(.+)$/gm, '<dl>\n<dt>$1</dt>\n<dd>$2</dd>\n</dl>');
            
            tempMd = tempMd.replace(/___CODE_BLOCK_(\d+)___/g, (match, index) => {
                return codeBlocks[index];
            });
            
            if (footnotes.length > 0) {
                tempMd += '\n\n<hr class="my-6 border-t border-slate-200 dark:border-slate-700">\n<section class="footnotes text-sm text-slate-600 dark:text-slate-400">\n<ol class="list-decimal pl-6">';
                footnotes.forEach(fn => {
                    tempMd += `\n<li id="fn-${fn.id}" class="mb-1">${fn.text} <a href="#fnref-${fn.id}" class="text-blue-500 hover:text-blue-600 ml-1">↩</a></li>`;
                });
                tempMd += '\n</ol>\n</section>';
            }
            return frontMatterHtml + tempMd;
        };

        // Helper for Autocomplete Placement
        function getCaretCoordinates(element, position) {
            const div = document.createElement('div');
            const style = window.getComputedStyle(element);
            ['boxSizing', 'width', 'height', 'overflowX', 'overflowY', 'paddingTop', 'paddingRight', 'paddingBottom', 'paddingLeft', 'fontStyle', 'fontVariant', 'fontWeight', 'fontStretch', 'fontSize', 'lineHeight', 'fontFamily', 'textAlign', 'textTransform', 'textIndent', 'textDecoration', 'letterSpacing', 'wordSpacing'].forEach(prop => div.style[prop] = style[prop]);
            div.style.position = 'absolute';
            div.style.visibility = 'hidden';
            div.style.whiteSpace = 'pre-wrap';
            div.style.wordWrap = 'break-word';
            div.textContent = element.value.substring(0, position);
            const span = document.createElement('span');
            span.textContent = element.value.substring(position) || '.';
            div.appendChild(span);
            document.body.appendChild(div);
            const coordinates = {
                top: span.offsetTop,
                left: span.offsetLeft,
                height: parseInt(style.lineHeight || style.fontSize)
            };
            document.body.removeChild(div);
            return coordinates;
        }

        // Initialize marked renderer for heading IDs
        marked.use({
            gfm: true,
            breaks: true,
            extensions: [emojiExtension],
            renderer: {
                heading(tokenOrText, level) {
                    // Handle marked v13+ (token object) and older versions (text string)
                    const text = typeof tokenOrText === 'string' ? tokenOrText : (tokenOrText?.text || '');
                    const depth = typeof tokenOrText === 'string' ? level : (tokenOrText?.depth || 1);
                    
                    const cleanText = text.replace(/<[^>]*>?/gm, '');
                    const id = cleanText.toLowerCase().replace(/[^\w]+/g, '-').replace(/^-+|-+$/g, '');
                    return `<h${depth} id="${id}">${text}</h${depth}>\n`;
                }
            }
        });

        const { useState, useEffect, useRef } = React;
    
        function App() {
            const [files, setFiles] = useState([]);
            const [activeFileId, setActiveFileId] = useState(null);
            const [sidebarWidth, setSidebarWidth] = useState(() => parseInt(localStorage.getItem('dotmd_sidebar_width')) || 240);
            const [isResizing, setIsResizing] = useState(false);
            const [showSidebar, setShowSidebar] = useState(() => window.innerWidth > 768);
            const [isMobile, setIsMobile] = useState(window.innerWidth <= 768);
            
            const [layout, setLayout] = useState('split');
            const [showHelp, setShowHelp] = useState(false);
            const [showToc, setShowToc] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [isFocusMode, setIsFocusMode] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [customCSS, setCustomCSS] = useState(() => localStorage.getItem('dotmd_custom_css') || '');
            const [darkMode, setDarkMode] = useState(() => {
                const saved = localStorage.getItem('dotmd_theme');
                if (saved) return saved === 'dark';
                return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            });
            const [emojiPicker, setEmojiPicker] = useState({ show: false, search: '', pos: 0, top: 0, left: 0, selectedIndex: 0 });

            // This effect runs once on mount to initialize files
            useEffect(() => {
                const savedFiles = localStorage.getItem('dotmd_files_v1');
                let initialFiles;
                if (savedFiles) {
                    initialFiles = JSON.parse(savedFiles);
                } else {
                    const oldContent = localStorage.getItem('dotmd_v2');
                    if (oldContent) {
                        initialFiles = [{ id: Date.now(), name: 'document.md', content: oldContent }];
                        localStorage.removeItem('dotmd_v2'); // Clean up old key
                    } else {
                        const defaultContent = "# Welcome to dotmd\n\nThis is your first file.\n\n- You can create more files using the '+' button in the file browser.\n- Click on a file to open it.\n- Rename and delete files using the icons next to the file name.";
                        initialFiles = [{ id: Date.now(), name: 'welcome.md', content: defaultContent }];
                    }
                }
                setFiles(initialFiles);

                const lastActiveId = localStorage.getItem('dotmd_active_file_id');
                if (lastActiveId && initialFiles.find(f => f.id === Number(lastActiveId))) {
                    setActiveFileId(Number(lastActiveId));
                } else if (initialFiles.length > 0) {
                    setActiveFileId(initialFiles[0].id);
                }
            }, []);

            // This effect persists file data to localStorage
            useEffect(() => {
                if (files.length > 0) {
                    localStorage.setItem('dotmd_files_v1', JSON.stringify(files));
                }
                if (activeFileId) {
                    localStorage.setItem('dotmd_active_file_id', activeFileId);
                }
            }, [files, activeFileId]);

            const activeFile = activeFileId ? files.find(f => f.id === activeFileId) : null;
            const markdown = activeFile ? activeFile.content : '';

            const setMarkdown = (newContent) => {
                if (!activeFileId) return;
                setFiles(currentFiles => 
                    currentFiles.map(file => 
                        file.id === activeFileId ? { ...file, content: newContent } : file
                    )
                );
            };

            // Undo / Redo History Stack
            const [historyState, setHistoryState] = useState({ canUndo: false, canRedo: false });
            const historyMap = useRef(new Map());
            const saveHistoryTimer = useRef(null);

            const getHistory = (id) => {
                if (!historyMap.current.has(id)) {
                    const file = files.find(f => f.id === id);
                    historyMap.current.set(id, { past: [], future: [], lastSaved: file ? file.content : '' });
                }
                return historyMap.current.get(id);
            };

            const updateHistoryState = () => {
                if (!activeFileId) return;
                const h = getHistory(activeFileId);
                setHistoryState({ canUndo: h.past.length > 0, canRedo: h.future.length > 0 });
            };

            useEffect(() => {
                updateHistoryState();
            }, [activeFileId, files.length]);

            const handleTextareaChange = (e) => {
                const newValue = e.target.value;
                setMarkdown(newValue);

                clearTimeout(saveHistoryTimer.current);
                saveHistoryTimer.current = setTimeout(() => {
                    if (!activeFileId) return;
                    const h = getHistory(activeFileId);
                    if (h.lastSaved !== newValue) {
                        h.past.push(h.lastSaved);
                        h.future = [];
                        h.lastSaved = newValue;
                        updateHistoryState();
                    }
                }, 500);

                // Emoji Autocomplete Logic
                const cursor = e.target.selectionStart;
                const textBeforeCursor = newValue.substring(0, cursor);
                const match = textBeforeCursor.match(/(?:^|[\s\n]):([a-zA-Z0-9_+-]*)$/);
                
                if (match) {
                    const searchStr = match[1];
                    const colonPos = cursor - searchStr.length - 1;
                    const coords = getCaretCoordinates(e.target, colonPos);
                    
                    setEmojiPicker({
                        show: true, search: searchStr, pos: colonPos,
                        top: Math.max(0, coords.top - e.target.scrollTop + coords.height),
                        left: Math.max(0, coords.left - e.target.scrollLeft),
                        selectedIndex: 0
                    });
                } else {
                    setEmojiPicker(prev => prev.show ? { ...prev, show: false } : prev);
                }
            };

            const handleUndo = () => {
                if (!activeFileId) return;
                const h = getHistory(activeFileId);
                if (h.past.length === 0) return;
                
                clearTimeout(saveHistoryTimer.current);
                const previousContent = h.past.pop();
                h.future.push(h.lastSaved);
                h.lastSaved = previousContent;
                
                setMarkdown(previousContent);
                updateHistoryState();
            };

            const handleRedo = () => {
                if (!activeFileId) return;
                const h = getHistory(activeFileId);
                if (h.future.length === 0) return;

                clearTimeout(saveHistoryTimer.current);
                const nextContent = h.future.pop();
                h.past.push(h.lastSaved);
                h.lastSaved = nextContent;

                setMarkdown(nextContent);
                updateHistoryState();
            };

            const insertEmoji = (shortcode) => {
                const el = textareaRef.current;
                if (!el) return;
                const start = emojiPicker.pos;
                const end = el.selectionStart;
                const text = el.value;
                const snippet = `:${shortcode}: `;
                const newContent = text.substring(0, start) + snippet + text.substring(end);
                
                clearTimeout(saveHistoryTimer.current);
                if (activeFileId) {
                    const h = getHistory(activeFileId);
                    h.past.push(h.lastSaved);
                    h.future = [];
                    h.lastSaved = newContent;
                    updateHistoryState();
                }

                setMarkdown(newContent);
                setEmojiPicker(p => ({ ...p, show: false }));
                
                setTimeout(() => {
                    el.focus();
                    el.setSelectionRange(start + snippet.length, start + snippet.length);
                }, 10);
            };

            const handleKeyDown = (e) => {
                if (emojiPicker.show) {
                    const filteredEmojis = Object.entries(EMOJI_MAP).filter(([key]) => key.includes(emojiPicker.search.toLowerCase())).slice(0, 6);
                    if (filteredEmojis.length > 0) {
                        if (e.key === 'ArrowDown') { e.preventDefault(); setEmojiPicker(p => ({ ...p, selectedIndex: Math.min(p.selectedIndex + 1, filteredEmojis.length - 1) })); return; }
                        if (e.key === 'ArrowUp') { e.preventDefault(); setEmojiPicker(p => ({ ...p, selectedIndex: Math.max(p.selectedIndex - 1, 0) })); return; }
                        if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); insertEmoji(filteredEmojis[emojiPicker.selectedIndex][0]); return; }
                    }
                    if (e.key === 'Escape') { e.preventDefault(); setEmojiPicker(p => ({ ...p, show: false })); return; }
                }

                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                    e.preventDefault();
                    if (e.shiftKey) handleRedo();
                    else handleUndo();
                } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
                    e.preventDefault();
                    handleRedo();
                }
            };
            
            const { wordCount, lineCount } = React.useMemo(() => {
                const trimmed = markdown.trim();
                return {
                    wordCount: trimmed ? trimmed.split(/\s+/).length : 0,
                    lineCount: markdown.split('\n').length
                };
            }, [markdown]);

            const toc = React.useMemo(() => {
                if (!markdown) return [];
                try {
                    const tokens = marked.lexer(markdown);
                    const headings = tokens.filter(t => t.type === 'heading');
                    return headings.map(h => {
                        const cleanText = h.text.replace(/<[^>]*>?/gm, '');
                        return {
                            text: cleanText,
                            level: h.depth,
                            id: cleanText.toLowerCase().replace(/[^\w]+/g, '-').replace(/^-+|-+$/g, '')
                        };
                    });
                } catch (e) {
                    return [];
                }
            }, [markdown]);

            const previewRef = useRef(null);
            const helpRef = useRef(null);
            const textareaRef = useRef(null);
            const editorPreRef = useRef(null);

            const highlightedMarkdown = React.useMemo(() => {
                if (!markdown) return '';
                try {
                    let html = hljs.highlight(markdown, { language: 'markdown' }).value;
                    return html + (markdown.endsWith('\n') ? '\n' : '');
                } catch (e) {
                    return markdown.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                }
            }, [markdown]);

            // Handle responsive layout fallback
            useEffect(() => {
                const handleResize = () => {
                    const mobile = window.innerWidth <= 768;
                    if (isMobile !== mobile) {
                        setIsMobile(mobile);
                    }
                    if (mobile && layout === 'split') {
                        setLayout('editor');
                    }
                };
                
                handleResize(); // Initial check
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, [layout, isMobile]);

            // Global Keyboard Shortcuts
            useEffect(() => {
                const handleGlobalKeyDown = (e) => {
                    if (e.key === 'Escape' && isFocusMode) {
                        setIsFocusMode(false);
                    }
                    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'p') {
                        e.preventDefault();
                        setLayout(prev => prev === 'preview' ? 'split' : 'preview');
                    }
                };
                window.addEventListener('keydown', handleGlobalKeyDown);
                return () => window.removeEventListener('keydown', handleGlobalKeyDown);
            }, [isFocusMode]);

        // Sync Highlight.js theme with Dark Mode
        useEffect(() => {
            let link = document.getElementById('hljs-theme');
            if (!link) {
                link = document.createElement('link');
                link.id = 'hljs-theme';
                link.rel = 'stylesheet';
                document.head.appendChild(link);
            }
            link.href = darkMode 
                ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css' 
                : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
        }, [darkMode]);

            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('dotmd_theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('dotmd_theme', 'light');
                }
            }, [darkMode]);

            useEffect(() => {
                localStorage.setItem('dotmd_custom_css', customCSS);
                
                let styleTag = document.getElementById('custom-css-override');
                if (!styleTag) {
                    styleTag = document.createElement('style');
                    styleTag.id = 'custom-css-override';
                    document.head.appendChild(styleTag);
                }
                styleTag.innerHTML = customCSS;
            }, [customCSS]);

            useEffect(() => {
                localStorage.setItem('dotmd_sidebar_width', sidebarWidth);
            }, [sidebarWidth]);

            useEffect(() => {
                if (!isResizing) return;
                const handleMouseMove = (e) => {
                    setSidebarWidth(Math.max(150, Math.min(e.clientX, 600)));
                };
                const handleMouseUp = () => setIsResizing(false);
                
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
                document.body.style.userSelect = 'none';
                document.body.style.cursor = 'col-resize';
                
                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                    document.body.style.userSelect = '';
                    document.body.style.cursor = '';
                };
            }, [isResizing]);

            const startResizing = (e) => {
                e.preventDefault();
                setIsResizing(true);
            };

            const renderFeatures = (container) => {
                if (!container) return;
                
                renderMathInElement(container, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ],
                    throwOnError: false
                });
        
                const mermaidDivs = container.querySelectorAll('.language-mermaid');
                if (mermaidDivs.length > 0) {
                    setTimeout(async () => {
                        mermaid.initialize({ 
                            startOnLoad: false, 
                            theme: darkMode ? 'dark' : 'neutral',
                            securityLevel: 'loose',
                            flowchart: { useMaxWidth: true, htmlLabels: true }
                        });
                        await mermaid.run({ nodes: mermaidDivs });
                    }, 50);
                }

            const codeBlocks = container.querySelectorAll('pre code');
            codeBlocks.forEach((block) => {
                if (!block.classList.contains('language-mermaid')) {
                    hljs.highlightElement(block);
                    
                    const pre = block.parentElement;
                    if (!pre.querySelector('.copy-btn')) {
                        const btn = document.createElement('button');
                        btn.className = 'copy-btn absolute top-2 right-2 p-1.5 rounded-md bg-slate-200/60 hover:bg-slate-300 dark:bg-slate-700/60 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-400 transition-all z-10';
                        btn.title = "Copy to clipboard";
                        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
                        
                        btn.onclick = () => {
                            navigator.clipboard.writeText(block.innerText).then(() => {
                                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                                setTimeout(() => {
                                    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
                                }, 2000);
                            });
                        };
                        pre.appendChild(btn);
                    }
                }
            });
            };

            // Scroll Sync Logic (Desktop only)
            const handleScroll = (e) => {
                if (editorPreRef.current) {
                    editorPreRef.current.scrollTop = e.target.scrollTop;
                    editorPreRef.current.scrollLeft = e.target.scrollLeft;
                }

                if (window.innerWidth > 768 && layout === 'split') {
                    const { scrollTop, scrollHeight, clientHeight } = e.target;
                    const scrollRatio = scrollTop / (scrollHeight - clientHeight);
                    
                    if (previewRef.current) {
                        const preview = previewRef.current;
                        preview.scrollTop = scrollRatio * (preview.scrollHeight - preview.clientHeight);
                    }
                }
            };

            useEffect(() => {
                renderFeatures(previewRef.current);
            }, [markdown, layout, darkMode]);

            useEffect(() => {
                if (showHelp) renderFeatures(helpRef.current);
            }, [showHelp, darkMode]);

            const insertSnippet = (snippet) => {
                const el = textareaRef.current;
                if (!el) return;
                const start = el.selectionStart;
                const end = el.selectionEnd;
                const text = el.value;
                const newContent = text.substring(0, start) + snippet + text.substring(end);
                
                clearTimeout(saveHistoryTimer.current);
                if (activeFileId) {
                    const h = getHistory(activeFileId);
                    h.past.push(h.lastSaved);
                    h.future = [];
                    h.lastSaved = newContent;
                    updateHistoryState();
                }

                setMarkdown(newContent);
                setTimeout(() => {
                    el.focus();
                    el.setSelectionRange(start + snippet.length, start + snippet.length);
                }, 10);
            };

            const addFile = () => {
                const newId = Date.now();
                const newName = prompt("Enter new file name:", `doc-${files.length + 1}.md`);
                if (!newName) return;
                const newFile = { id: newId, name: newName, content: `# ${newName}\n` };
                setFiles([...files, newFile]);
                setActiveFileId(newId);
            };

            const renameFile = (fileId) => {
                const fileToRename = files.find(f => f.id === fileId);
                if (!fileToRename) return;
                const newName = prompt("Enter new name:", fileToRename.name);
                if (newName && newName !== fileToRename.name) {
                    setFiles(currentFiles =>
                        currentFiles.map(file =>
                            file.id === fileId ? { ...file, name: newName } : file
                        )
                    );
                }
            };

            const deleteFile = (fileIdToDelete) => {
                if (files.length <= 1) { return alert("You can't delete the last file."); }
                if (!confirm(`Are you sure you want to delete "${files.find(f=>f.id===fileIdToDelete).name}"?`)) return;
                const newFiles = files.filter(f => f.id !== fileIdToDelete);
                setFiles(newFiles);
                historyMap.current.delete(fileIdToDelete);
                if (activeFileId === fileIdToDelete) { setActiveFileId(newFiles[0].id); }
            };

            const doExport = (type) => {
                const filename = activeFile ? activeFile.name.replace(/\.md$/, '') : `dotmd_${new Date().toISOString().split('T')[0]}`;

                if (type === 'pdf') {
                    const originalLayout = layout;
                    setLayout('preview');
                    setTimeout(() => { 
                        window.print(); 
                        setLayout(originalLayout);
                        setIsExporting(false); 
                    }, 500);
                    return;
                }

                let blob, ext;
                if (type === 'md') { blob = new Blob([markdown], { type: 'text/markdown' }); ext = ".md"; }
                else if (type === 'txt') { blob = new Blob([markdown], { type: 'text/plain' }); ext = ".txt"; }
                else { 
                    const html = marked.parse(processExtendedMarkdown(markdown));
                    const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:sans-serif;line-height:1.6;padding:2rem;max-width:800px;margin:auto;}</style></head><body>${html}</body></html>`;
                    blob = new Blob([doc], { type: 'text/html' }); ext = ".html"; 
                }

                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename + ext; a.click();
                URL.revokeObjectURL(url);
                setIsExporting(false);
            };

            const tools = [
                { label: "#", cmd: "# " },
                { label: "$$", cmd: "$$ \n\n $$" },
                { label: "Flow", cmd: "```mermaid\nflowchart TD\n  A --> B\n```" },
                { label: "UML", cmd: "```plantuml\n@startuml\nAlice -> Bob: Hello\n@enduml\n```" },
                { label: "Bold", cmd: "****" },
                { label: "Table", cmd: "| H | H |\n|---|---|\n| D | D |" }
            ];

            const helpMarkdown = `
# dotmd Documentation

Welcome to **dotmd**, your lightweight, fully-featured Markdown editor.

## 1. Workspace & Editor
- **Multi-File Workspace**: Use the left sidebar to manage multiple documents. Everything is auto-saved locally.
- **Layouts**: Toggle Edit, Split, and View modes from the top right. 
- **Focus Mode**: Click the Focus icon (square with corners) to hide all sidebars for distraction-free writing. Press \`ESC\` to exit.
- **Table of Contents**: Click the TOC icon to view a dynamically generated, clickable outline of your headings.
- **Editor Tools**: The editor features real-time syntax highlighting, line/word counts, and Undo/Redo history (via toolbar or \`Ctrl+Z\`/\`Ctrl+Y\`).

## 2. Basic Markdown Syntax
- **Bold**: \`**text**\` | *Italic*: \`*text*\` | ~~Strikethrough~~: \`~~text~~\`
- **Inline Code**: \` \\\`code\\\` \`
- **Lists**: Use \`-\` or \`*\` for unordered, \`1.\` for ordered.
- **Tables**:
\`\`\`markdown
| Parameter | Value |
| :--- | :---: |
| Index (n) | 1.52 |
\`\`\`

## 3. Advanced Markdown
### Task & Definition Lists
- [x] Task lists are fully supported!

Term
: A lightweight definition list.

Add footnotes easily [^1]. Type \`:\` in the editor to trigger the **Emoji Autocomplete** dropdown and insert emojis like :rocket: and :sparkles:.

## 4. Mathematics (LaTeX)
Powered by KaTeX. Use \`$\` for inline and \`$$\` for blocks.
- **Fractions**: \`\\frac{a}{b}\` -> $\\frac{a}{b}$
- **Sup/Sub**: \`n_1^2, e^{i\\phi}\` -> $n_1^2, e^{i\\phi}$

## 5. Diagrams & Code
Code blocks feature automatic syntax highlighting and a "Copy to Clipboard" button on hover. 
Wrap code in \`\`\`mermaid\`\`\` or \`\`\`plantuml\`\`\` to render live diagrams:
\`\`\`mermaid
flowchart LR
    A[Start] --> B{Condition}
    B -- Yes --> C[Result]
\`\`\`

## 6. Exporting & SSG
- **Formats**: Export to Markdown (\`.md\`), Plain Text (\`.txt\`), HTML (\`.html\`), or Print/PDF.
- **Front-matter**: Add YAML front-matter to the very top of your document for Static Site Generator compatibility. It will automatically render as a clean metadata table.
\`\`\`yaml
---
title: dotmd Documentation
author: You
---
\`\`\`

## 7. Customization
- **Dark Mode**: Toggle the Moon/Sun icon to switch themes.
- **Custom CSS**: Click the Settings gear to inject your own CSS. Target the \`.preview-area\` classes to completely personalize the renderer!

[^1]: This is the footnote definition at the bottom.
`;

            return (
                <div className="flex flex-col h-screen max-h-screen bg-slate-100 dark:bg-slate-900 transition-colors">
                    {/* Header */}
                    <header className={`pt-10 pb-3 px-6 bg-white dark:bg-slate-800 border-b dark:border-slate-700 justify-between items-center z-30 shadow-sm transition-colors ${isFocusMode ? 'hidden' : 'flex'}`}>
                        <div className="flex items-center gap-3">
                            <button onClick={() => setShowSidebar(!showSidebar)} className="text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors -ml-2" title="Toggle Files">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                            </button>
                            <h1 className="text-xl font-black text-blue-600 dark:text-blue-400 italic tracking-tighter">dotmd</h1>

                                {darkMode ? (

                            </button>
                            <button onClick={() => setIsFocusMode(true)} className="text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" title="Focus Mode">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg>
                            </button>

                        <div className="flex items-center gap-2">

                                <button onClick={() => setLayout('split')} className={`hidden md:block px-3 py-1 rounded-md text-[10px] font-bold transition-all ${layout === 'split' ? 'bg-white dark:bg-slate-700 shadow-sm text-blue-600 dark:text-blue-400' : 'text-gray-500 dark:text-gray-400'}`}>Split</button>
                                <button onClick={() => setLayout('preview')} className={`px-3 py-1 rounded-md text-[10px] font-bold transition-all ${layout === 'preview' ? 'bg-white dark:bg-slate-700 shadow-sm text-blue-600 dark:text-blue-400' : 'text-gray-500 dark:text-gray-400'}`}>View</button>

                                        <button onClick={() => doExport('txt')} className="w-full text-left px-4 py-3 text-sm active:bg-slate-50 dark:active:bg-slate-700 border-b dark:border-slate-700 text-slate-700 dark:text-slate-200">Plain Text (TXT)</button>
                                        <button onClick={() => doExport('html')} className="w-full text-left px-4 py-3 text-sm active:bg-slate-50 dark:active:bg-slate-700 border-b dark:border-slate-700 text-slate-700 dark:text-slate-200">HTML</button>
                                        <button onClick={() => doExport('pdf')} className="w-full text-left px-4 py-3 text-sm active:bg-slate-50 dark:active:bg-slate-700 text-blue-600 dark:text-blue-400 font-bold">PDF (Print)</button>
                                    </div>

                    {/* Work Area */}

                        {/* File Browser */}
                        <aside 
                            className={`bg-slate-100/50 dark:bg-slate-900/50 border-r dark:border-slate-800 flex flex-col flex-shrink-0
                                      fixed md:relative inset-y-0 left-0 z-40 transition-all duration-300 ease-in-out overflow-hidden
                                      ${showSidebar ? 'translate-x-0' : '-translate-x-full md:translate-x-0'} ${isFocusMode ? '!hidden' : ''}`}

                                        <span className="truncate pr-2">{file.name}</span>
                                        <div className="flex items-center opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onClick={(e) => { e.stopPropagation(); renameFile(file.id) }} className="p-1 hover:text-slate-900 dark:hover:text-white" title="Rename"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                                            <button onClick={(e) => { e.stopPropagation(); deleteFile(file.id) }} className="p-1 hover:text-red-500" title="Delete"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div 
                                className={`absolute top-0 -right-1 w-2 h-full cursor-col-resize z-20 transition-colors hover:bg-blue-500/50 ${isResizing ? 'bg-blue-500/50' : ''} hidden md:block`}
                                onMouseDown={startResizing}
                            />
                        </aside>

                        <main className={`flex-1 flex overflow-hidden p-2 gap-2 ${layout === 'split' ? 'work-area-split' : 'flex-col md:flex-row overflow-hidden'}`}>
                            {/* Editor Pane */}
                            <section className={`pane-transition bg-white dark:bg-slate-800 rounded-2xl shadow-sm border dark:border-slate-700 overflow-hidden flex flex-col transition-colors ${layout === 'editor' || layout === 'split' ? 'flex-1' : 'hidden'}`}>
                                <div className="px-4 py-2 border-b dark:border-slate-700 flex justify-between items-center bg-slate-50/50 dark:bg-slate-800/50">
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 truncate pr-4">{activeFile?.name || 'Editor'}</span>
                                    <button onClick={() => setLayout(layout === 'editor' ? 'split' : 'editor')} className="hidden md:block text-slate-400 hover:text-blue-600 dark:hover:text-blue-400">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
                                    </button>
                                </div>
                                <div className="relative flex-1 overflow-hidden bg-transparent">
                                    <pre 
                                        ref={editorPreRef}
                                        className="absolute inset-0 p-6 text-[17px] leading-relaxed font-mono whitespace-pre-wrap break-words overflow-y-auto no-scrollbar pointer-events-none text-slate-700 dark:text-slate-300 z-0 m-0 bg-transparent"
                                        aria-hidden="true"
                                    >
                                        <code 
                                            className="hljs language-markdown !bg-transparent !p-0 text-inherit"
                                            dangerouslySetInnerHTML={{ __html: highlightedMarkdown }}
                                        />
                                    </pre>
                                    <textarea 
                                        key={activeFileId}
                                        ref={textareaRef}
                                        className={[
                                            "absolute inset-0 z-10 p-6",
                                            "bg-transparent text-transparent font-mono text-[17px]",
                                            "leading-relaxed whitespace-pre-wrap break-words overflow-y-auto",
                                            "outline-none resize-none no-scrollbar",
                                            "caret-slate-900 dark:caret-slate-100",
                                            "selection:bg-blue-500/30 selection:text-transparent"
                                        ].join(" ")}
                                        value={markdown}
                                        onChange={handleTextareaChange}
                                        onKeyDown={handleKeyDown}
                                        onClick={() => setEmojiPicker(p => ({ ...p, show: false }))}
                                        onFocus={() => { if (showSidebar) setShowSidebar(false); setEmojiPicker(p => ({ ...p, show: false })); }}
                                        onScroll={handleScroll}
                                        spellCheck="false"
                                    />
                                    {/* Emoji Picker */}
                                    {emojiPicker.show && (
                                        <div 
                                            className="absolute z-50 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-xl shadow-2xl overflow-hidden ring-1 ring-black/5 dark:ring-white/10 w-48 flex flex-col"
                                            style={{ top: emojiPicker.top + 10, left: emojiPicker.left }}
                                        >
                                            {Object.entries(EMOJI_MAP).filter(([key]) => key.includes(emojiPicker.search.toLowerCase())).slice(0, 6).map(([key, emoji], idx) => (
                                                <div 
                                                    key={key}
                                                    onMouseDown={(e) => { e.preventDefault(); insertEmoji(key); }}
                                                    onMouseEnter={() => setEmojiPicker(p => ({ ...p, selectedIndex: idx }))}
                                                    className={`px-3 py-2 text-sm cursor-pointer flex items-center gap-2 ${idx === emojiPicker.selectedIndex ? 'bg-blue-50 dark:bg-slate-700 text-blue-600 dark:text-blue-400' : 'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}
                                                >
                                                    <span className="text-lg">{emoji}</span>
                                                    <span className="truncate">:{key}:</span>
                                                </div>
                                            ))}
                                            {Object.entries(EMOJI_MAP).filter(([key]) => key.includes(emojiPicker.search.toLowerCase())).length === 0 && (
                                                <div className="px-3 py-2 text-sm text-slate-400 italic">No emojis found</div>
                                            )}
                                        </div>
                                    )}
                                </div>
                                <div className="p-2 border-t dark:border-slate-700 flex justify-between items-center gap-2 bg-white dark:bg-slate-800">
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar items-center">
                                        <button onClick={handleUndo} disabled={!historyState.canUndo} className={`tool-btn ${!historyState.canUndo ? 'opacity-50 cursor-not-allowed' : 'active:bg-slate-100 dark:active:bg-slate-700'}`} title="Undo (Ctrl+Z)">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                                        </button>
                                        <button onClick={handleRedo} disabled={!historyState.canRedo} className={`tool-btn ${!historyState.canRedo ? 'opacity-50 cursor-not-allowed' : 'active:bg-slate-100 dark:active:bg-slate-700'}`} title="Redo (Ctrl+Y)">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
                                        </button>
                                        <div className="w-px h-5 bg-slate-200 dark:bg-slate-700 mx-1"></div>
                                        {tools.map((t, i) => (
                                            <button key={i} onClick={() => insertSnippet(t.cmd)} className="tool-btn active:bg-slate-100 dark:active:bg-slate-700">{t.label}</button>
                                        ))}
                                    </div>
                                    <div className="flex-shrink-0 flex items-center gap-4 pr-2 text-xs text-slate-400 dark:text-slate-500 font-mono">
                                        <span>{lineCount} Lines</span>
                                        <span>{wordCount} Words</span>
                                    </div>
                                </div>
                            </section>

                            {/* Preview Pane */}
                            <section className={`pane-transition bg-white dark:bg-slate-800 rounded-2xl shadow-sm border dark:border-slate-700 overflow-hidden flex flex-col transition-colors ${layout === 'preview' || layout === 'split' ? 'flex-1' : 'hidden'}`}>
                                <div className="px-4 py-2 border-b dark:border-slate-700 flex justify-between items-center bg-slate-50/50 dark:bg-slate-800/50">
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Preview</span>
                                    <button onClick={() => setLayout(layout === 'preview' ? 'split' : 'preview')} className="hidden md:block text-slate-400 hover:text-blue-600 dark:hover:text-blue-400">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
                                    </button>
                                </div>
                                <div 
                                    key={`preview-${darkMode}-${activeFileId}`}
                                    ref={previewRef}
                                    className="preview-area flex-1 p-6 overflow-y-auto no-scrollbar scroll-smooth text-slate-800 dark:text-slate-200"
                                dangerouslySetInnerHTML={{ __html: marked.parse(processExtendedMarkdown(markdown)) }}
                                />
                            </section>
                        </main>

                        {/* Table of Contents */}
                        {showToc && !isFocusMode && (
                            <>
                                {isMobile && (
                                    <div className="fixed inset-0 bg-black/20 backdrop-blur-sm z-30" onClick={() => setShowToc(false)}></div>
                                )}
                                <aside className="w-64 bg-slate-100/50 dark:bg-slate-900/50 border-l dark:border-slate-800 flex flex-col flex-shrink-0 z-40 fixed md:relative right-0 inset-y-0 shadow-xl md:shadow-none">
                                    <div className="p-3 flex justify-between items-center border-b dark:border-slate-800 h-[45px]">
                                        <h2 className="font-bold text-xs uppercase tracking-wider text-slate-500">Contents</h2>
                                        <button onClick={() => setShowToc(false)} className="text-slate-400 hover:text-red-500 transition-colors">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                        </button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar py-2 px-3">
                                        {toc.map((item, i) => (
                                            <div 
                                                key={i} 
                                                onClick={() => document.getElementById(item.id)?.scrollIntoView({ behavior: 'smooth' })}
                                                className="py-1.5 text-sm text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer truncate transition-colors"
                                                style={{ paddingLeft: `${(item.level - 1) * 0.75}rem` }}
                                                title={item.text}
                                            >
                                                {item.text}
                                            </div>
                                        ))}
                                        {toc.length === 0 && (
                                            <div className="text-sm text-slate-400 italic text-center mt-4">No headings found.</div>
                                        )}
                                    </div>
                                </aside>
                            </>
                        )}

                        {/* Exit Focus Mode Button */}
                        {isFocusMode && (
                            <button 
                                onClick={() => setIsFocusMode(false)}
                                className="fixed top-6 right-6 z-50 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2 text-xs font-bold transition-transform active:scale-95"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>
                                EXIT FOCUS
                            </button>
                        )}
                    </div>

                    {/* Help Drawer */}
                    {showHelp && (
                        <div className="fixed inset-0 z-50 flex justify-end">
                            <div className="absolute inset-0 bg-black/20 dark:bg-black/50 backdrop-blur-sm transition-colors" onClick={() => setShowHelp(false)}></div>
                            <div className="relative w-full max-w-xl bg-white dark:bg-slate-800 h-full shadow-2xl flex flex-col pane-transition transition-colors">
                                <div className="flex justify-between items-center p-6 border-b dark:border-slate-700">
                                    <h2 className="text-2xl font-bold dark:text-white">Documentation</h2>
                                    <button onClick={() => setShowHelp(false)} className="p-2 bg-slate-100 dark:bg-slate-700 rounded-full hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-300">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                    </button>
                                </div>
                                <div 
                                    key={`help-${darkMode}`}
                                    ref={helpRef}
                                    className="preview-area flex-1 p-8 overflow-y-auto no-scrollbar text-slate-800 dark:text-slate-200" 
                                dangerouslySetInnerHTML={{ __html: marked.parse(processExtendedMarkdown(helpMarkdown)) }} 
                                />
                            </div>
                        </div>
                    )}

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center">
                            <div className="absolute inset-0 bg-black/20 dark:bg-black/50 backdrop-blur-sm" onClick={() => setShowSettings(false)}></div>
                            <div className="relative w-full max-w-2xl bg-white dark:bg-slate-800 rounded-2xl shadow-2xl flex flex-col p-6 m-4 max-h-[80vh] pane-transition">
                                <div className="flex justify-between items-center border-b dark:border-slate-700 pb-4 mb-4">
                                    <h2 className="text-xl font-bold dark:text-white">Settings</h2>
                                    <button onClick={() => setShowSettings(false)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full text-slate-500 dark:text-slate-400 transition-colors">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                    </button>
                                </div>
                                <div className="flex-1 flex flex-col gap-2 overflow-hidden">
                                    <label className="font-bold text-sm text-slate-700 dark:text-slate-300">Custom CSS</label>
                                    <p className="text-xs text-slate-500 dark:text-slate-400 mb-2">Inject your own CSS to personalize the Preview renderer. Target \`.preview-area\` classes.</p>
                                    <textarea 
                                        className="flex-1 p-4 font-mono text-sm bg-slate-50 dark:bg-slate-900 border dark:border-slate-700 rounded-xl outline-none resize-none text-slate-800 dark:text-slate-200 shadow-inner"
                                        placeholder=".preview-area h1 { color: red; }"
                                        value={customCSS}
                                        onChange={(e) => setCustomCSS(e.target.value)}
                                        spellCheck="false"
                                    />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
    
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
