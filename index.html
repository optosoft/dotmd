<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>dotmd</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .preview-area { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .preview-area h1 { font-size: 1.8rem; font-weight: 700; margin: 1.5rem 0 1rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3rem; }
        .preview-area h2 { font-size: 1.4rem; font-weight: 600; margin: 1.2rem 0 0.8rem; }
        .preview-area p { margin-bottom: 1rem; line-height: 1.6; }
        .preview-area code { background: #f6f8fa; padding: 0.2rem 0.4rem; border-radius: 3px; font-family: monospace; }
        
        /* Toolbelt Button Styling */
        .tool-btn {
            flex-shrink: 0;
            padding: 6px 12px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.1s;
        }
        .tool-btn:active {
            transform: scale(0.95);
            background: #f1f5f9;
        }
    </style>
</head>
<body class="bg-white text-gray-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
    
        function App() {
            const [markdown, setMarkdown] = useState("# Optical Engineering\n\nReflection coefficient:\n\n$$R = \\left| \\frac{n_1 - n_2}{n_1 + n_2} \\right|^2$$");
            const [view, setView] = useState('edit');
            const previewRef = useRef(null);
            const textareaRef = useRef(null);

            // 1. Core Rendering Logic (Math & Diagrams)
            useEffect(() => {
                if (view === 'preview' && previewRef.current) {
                    renderMathInElement(previewRef.current, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false}
                        ],
                        throwOnError: false
                    });
            
                    setTimeout(async () => {
                        const mermaidDivs = previewRef.current.querySelectorAll('.language-mermaid');
                        if (mermaidDivs.length > 0) {
                            mermaid.initialize({ 
                                startOnLoad: false, 
                                theme: 'neutral',
                                securityLevel: 'loose',
                                flowchart: { useMaxWidth: true, htmlLabels: true }
                            });
                            await mermaid.run({ nodes: mermaidDivs });
                        }
                    }, 50); 
                }
            }, [view, markdown]);

            // 2. IntelliSense / Shortcut Injection Logic
            const insertText = (textToInsert) => {
                if (!textareaRef.current) return;
                
                const textarea = textareaRef.current;
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const text = textarea.value;
                const before = text.substring(0, start);
                const after = text.substring(end, text.length);
                
                const newText = before + textToInsert + after;
                setMarkdown(newText);
                
                // Focus back and move cursor
                setTimeout(() => {
                    textarea.focus();
                    textarea.setSelectionRange(start + textToInsert.length, start + textToInsert.length);
                }, 10);
            };

            const downloadFile = () => {
                const blob = new Blob([markdown], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "optical_note.md";
                a.click();
            };

            const shortcuts = [
                { label: "H1", text: "# " },
                { label: "H2", text: "## " },
                { label: "Math", text: "$$ \n\n $$" },
                { label: "Flowchart", text: "```mermaid\nflowchart TD\n  Start --> End\n```" },
                { label: "Reflection", text: "$$ R = \\left| \\frac{n_1 - n_2}{n_1 + n_2} \\right|^2 $$" },
                { label: "Table", text: "| Col 1 | Col 2 |\n|---|---|\n| Data | Data |" },
                { label: "Bold", text: "****" },
                { label: "Code", text: "```\n\n```" }
            ];
    
            return (
                <div className="flex flex-col h-screen max-h-screen bg-white">
                    {/* Header */}
                    <header className="pt-12 pb-4 px-6 border-b flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-10">
                        <h1 className="text-xl font-bold tracking-tight text-blue-600">dotmd</h1>
                        <div className="flex gap-2">
                             <button onClick={downloadFile} className="bg-blue-600 active:bg-blue-700 text-white px-5 py-1.5 rounded-full text-sm font-semibold shadow-sm transition-all">
                                Export
                            </button>
                        </div>
                    </header>
    
                    {/* Editor / Preview Area */}
                    <main className="flex-1 overflow-hidden relative">
                        {view === 'edit' ? (
                            <textarea 
                                ref={textareaRef}
                                className="w-full h-full p-6 text-[17px] leading-relaxed outline-none resize-none font-mono text-gray-800 bg-gray-50"
                                value={markdown}
                                onChange={(e) => setMarkdown(e.target.value)}
                                placeholder="Type here..."
                                spellCheck="false"
                            />
                        ) : (
                            <div 
                                ref={previewRef}
                                className="preview-area w-full h-full p-6 overflow-y-auto"
                                dangerouslySetInnerHTML={{ __html: marked.parse(markdown) }}
                            />
                        )}
                    </main>

                    {/* IntelliSense Shortcut Toolbelt (Only visible in Edit mode) */}
                    {view === 'edit' && (
                        <div className="flex gap-2 p-3 bg-slate-50 border-t overflow-x-auto no-scrollbar">
                            {shortcuts.map((s, idx) => (
                                <button key={idx} onClick={() => insertText(s.text)} className="tool-btn">
                                    {s.label}
                                </button>
                            ))}
                        </div>
                    )}
    
                    {/* iOS Tab Bar Navigation */}
                    <nav className="pb-10 pt-3 bg-white border-t flex justify-around items-center shadow-[0_-1px_3px_rgba(0,0,0,0.05)]">
                        <button 
                            onClick={() => setView('edit')} 
                            className={`flex flex-col items-center px-10 py-1 rounded-xl transition-all ${view === 'edit' ? 'text-blue-600 bg-blue-50 font-bold' : 'text-gray-400'}`}
                        >
                            <span className="text-[11px] uppercase tracking-wider">Editor</span>
                        </button>
                        <button 
                            onClick={() => setView('preview')} 
                            className={`flex flex-col items-center px-10 py-1 rounded-xl transition-all ${view === 'preview' ? 'text-blue-600 bg-blue-50 font-bold' : 'text-gray-400'}`}
                        >
                            <span className="text-[11px] uppercase tracking-wider">Preview</span>
                        </button>
                    </nav>
                </div>
            );
        }
    
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
