<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>dotmd</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .preview-area { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .preview-area h1 { font-size: 1.8rem; font-weight: 700; margin: 1.5rem 0 1rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3rem; }
        .preview-area h2 { font-size: 1.4rem; font-weight: 600; margin: 1.2rem 0 0.8rem; }
        .preview-area p { margin-bottom: 1rem; line-height: 1.6; }
        .preview-area code { background: #f6f8fa; padding: 0.2rem 0.4rem; border-radius: 3px; font-family: monospace; }
    </style>
</head>
<body class="bg-white text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [markdown, setMarkdown] = useState("# Optical Engineering Note\n\nReflection at normal incidence:\n\n$$R = \\left| \\frac{n_1 - n_2}{n_1 + n_2} \\right|^2$$");
            const [view, setView] = useState('edit');
            const previewRef = useRef(null);

            // This effect handles the math rendering whenever the preview is shown
            useEffect(() => {
                if (view === 'preview' && previewRef.current) {
                    renderMathInElement(previewRef.current, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false}
                        ],
                        throwOnError: false
                    });
                }
            }, [view, markdown]);

            const downloadFile = () => {
                const blob = new Blob([markdown], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "note.md";
                a.click();
            };

            return (
                <div className="flex flex-col h-screen max-h-screen overflow-hidden">
                    <header className="pt-12 pb-4 px-6 bg-white border-b flex justify-between items-center">
                        <h1 className="text-xl font-bold tracking-tight">dotmd</h1>
                        <button onClick={downloadFile} className="bg-blue-600 text-white px-4 py-1 rounded-full text-sm font-medium">Export</button>
                    </header>

                    <main className="flex-1 overflow-hidden relative">
                        {view === 'edit' ? (
                            <textarea 
                                className="w-full h-full p-6 text-lg outline-none resize-none no-scrollbar font-mono text-gray-700"
                                value={markdown}
                                onChange={(e) => setMarkdown(e.target.value)}
                                placeholder="Enter Markdown..."
                            />
                        ) : (
                            <div 
                                ref={previewRef}
                                className="preview-area w-full h-full p-6 overflow-y-auto no-scrollbar"
                                dangerouslySetInnerHTML={{ __html: marked.parse(markdown) }}
                            />
                        )}
                    </main>

                    <nav className="pb-8 pt-2 bg-gray-50 border-t flex justify-around items-center">
                        <button onClick={() => setView('edit')} className={`px-8 py-2 rounded-lg transition-colors ${view === 'edit' ? 'bg-white shadow-sm text-blue-600 font-bold' : 'text-gray-400'}`}>
                            Editor
                        </button>
                        <button onClick={() => setView('preview')} className={`px-8 py-2 rounded-lg transition-colors ${view === 'preview' ? 'bg-white shadow-sm text-blue-600 font-bold' : 'text-gray-400'}`}>
                            Preview
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
