<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD-Go Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Hide scrollbars for a clean iOS look */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .preview-area h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; }
        .preview-area p { margin-bottom: 0.5rem; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [markdown, setMarkdown] = useState("# Welcome to MD-Go\n\nStart typing...");
            const [view, setView] = useState('edit'); // 'edit' or 'preview'

            const downloadFile = () => {
                const blob = new Blob([markdown], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "note.md";
                a.click();
            };

            return (
                <div class="flex flex-col h-screen max-h-screen">
                    <header class="pt-12 pb-4 px-6 bg-white/80 backdrop-blur-md border-b flex justify-between items-center sticky top-0">
                        <h1 class="text-xl font-semibold">MD-Go</h1>
                        <div class="space-x-4">
                            <button onClick={downloadFile} class="text-blue-600 font-medium text-sm">Save</button>
                        </div>
                    </header>

                    <main class="flex-1 overflow-hidden relative">
                        {view === 'edit' ? (
                            <textarea 
                                className="w-full h-full p-6 text-lg outline-none resize-none no-scrollbar bg-transparent"
                                value={markdown}
                                onChange={(e) => setMarkdown(e.target.value)}
                                placeholder="Write something..."
                            />
                        ) : (
                            <div 
                                className="preview-area w-full h-full p-6 overflow-y-auto no-scrollbar"
                                dangerouslySetInnerHTML={{ __html: marked.parse(markdown) }}
                            />
                        )}
                    </main>

                    <nav class="pb-8 pt-2 px-10 bg-white border-t flex justify-around items-center">
                        <button onClick={() => setView('edit')} className={`flex flex-col items-center ${view === 'edit' ? 'text-blue-600' : 'text-gray-400'}`}>
                            <span class="text-xs mt-1 font-medium">Editor</span>
                        </button>
                        <button onClick={() => setView('preview')} className={`flex flex-col items-center ${view === 'preview' ? 'text-blue-600' : 'text-gray-400'}`}>
                            <span class="text-xs mt-1 font-medium">Preview</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
